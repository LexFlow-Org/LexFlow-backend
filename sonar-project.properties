sonar.projectKey=PieProton_LexFlow-backend
sonar.organization=pieproton
sonar.host.url=https://sonarcloud.io

# Sources -- Rust backend only (client is in LexFlow main repo)
sonar.sources=src-tauri/src
sonar.exclusions=src-tauri/target/**,src-tauri/gen/**,src-tauri/Cargo.lock,client/**

# Rust analysis via Clippy JSON report
sonar.externalIssuesReportPaths=clippy-sonar.json

# Encoding
sonar.sourceEncoding=UTF-8

# Language hints
sonar.language=rust
